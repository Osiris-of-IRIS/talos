# Build, test (gate), and deploy TALOS to GitHub Pages. Decision IDs: ADR-0001, ADR-0002.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r tests/test_harness/requirements.txt
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: python tests/test_harness/runner.py # traceability + golden-data gate (ADR-0018)
      - run: python -m unittest discover -s tests/test_harness -p 'test_*.py' # harness self-tests
      - run: npm test # unit/integration gate: failing tests block deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e # E2E gate (Playwright)
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
