  user_story: "As a user, I want the BSI library available at startup so I can use existing catalogs and component-definitions without uploading."
  acceptance_criteria:
    - "Library index read at startup; artifact bodies fetched lazily and cached (path+sha)."
    - "Anwenderkataloge + Komponenten shown by default; Quellkataloge behind an advanced toggle."
    - "Library items are read-only with a provenance badge; 'adopt' copies into the workspace with a new uuid."
    - "Graceful offline fallback to cache with a warning; CC-BY-SA-4.0 attribution shown."
  status: "In-Progress"
  scope_note: "T-034 done: bundled library-index.json manifest (read at startup), lazy fetch from raw.githubusercontent with retry/timeout, cache-by-sha in libraryCache, offline fallback + warning, read-only provenance badge, adopt→workspace (origin user, new uuid), CC-BY-SA-4.0 attribution, Quellkataloge behind advanced toggle. Regenerate manifest via tools/gen-library-index.mjs. Deferred: background sha-refresh job, using non-adopted library catalogs directly in the T-142 pickers (adopt-first for now), real E2E over the network."
  linked_adr_ids: ["ADR-0005", "ADR-0010", "ADR-0004"]
  linked_test_ids: ["TEST-LIB-01", "TEST-LIB-02", "TEST-LIB-03"]

- id: PLAT-003
  title: "Persistence & file I/O"
  user_story: "As a user, I want my work saved locally and to import/export OSCAL files so nothing is lost and artifacts are portable."
  acceptance_criteria:
    - "Artifacts persist in IndexedDB across sessions; data never leaves the device."
    - "Upload validates OSCAL and stores as imported; uuid collision prompts overwrite vs import-as-copy (default copy)."
    - "Any artifact downloads as spec-conformant OSCAL JSON; a selected subset of same-type artifacts downloads as one zip bundle."
    - "Draft-friendly: editing is never blocked by validation; validity is surfaced non-blocking and enforced at export."
  status: "In-Progress"
  scope_note: "ADR-0027: the 'export bundle' half of this feature's original zip acceptance criterion is now implemented, scoped to a per-page, per-type selection (buildArtifactsZip/downloadArtifactsAsZip, src/data/bulkExport.ts, via fflate) rather than one whole-workspace, all-types bundle — that broader combination (+ a manifest, per the original wording) remains unbuilt future work. A record failing export validation (ADR-0019) is skipped with a warning, not blocking the rest of the batch. T-151 (gap found in T-021): validateForExport (src/data/fileIo.ts) now also requires a non-empty metadata.title and metadata.version — both are free-text fields draft-friendly editing can clear, unlike uuid (always set at creation/import) — gating both single-artifact downloadArtifact and the bulk-export path (same choke point, so both already picked up the new rules with no separate wiring). metadata.oscal-version is deliberately not part of this gate: serializeArtifact's normalizeExportVersion unconditionally rewrites it to the authoring version on every export, so no exported document can carry an invalid one regardless of the stored value. Full NIST JSON-Schema validation (per-type required fields beyond the shared base) stays deferred to T-030."
  linked_adr_ids: ["ADR-0004", "ADR-0003", "ADR-0007", "ADR-0019", "ADR-0027"]
  linked_test_ids: ["TEST-PERS-01", "TEST-PERS-02", "TEST-FILE-01", "TEST-BULK-01", "TEST-BULK-02"]

- id: PLAT-004
  title: "Shared platform (models, i18n, theme, markup, search)"
  user_story: "As a developer, I want reusable OSCAL models and shared UI utilities so every feature is consistent and safe."
  acceptance_criteria:
    - "Reusable OscalArtifact base (metadata + back-matter) extended per type; envelope codec round-trips."
    - "OSCAL markup rendered XSS-safe everywhere via one renderer, supporting the full metaschema markup-line/markup-multiline subset (headings, lists incl. nesting, code blocks, blockquotes, tables w/ alignment, specialized character escaping, parameter-insertion placeholder) — images remain excluded on XSS grounds (ADR-0030)."
    - "Long markup-line/markup-multiline content truncates to a consistent size by default and expands to the full, beautified content in a modal (ADR-0022)."
    - "Long-text editing fields offer basic formatting help (bold/italic/code/link) and a preview (ADR-0024)."
    - "Every editable OSCAL markup-multiline field uses the shared <MarkupEditor>, with no exceptions once an editor exists for it (ADR-0025)."
    - "Entity-search typeahead over IndexedDB with scoping; i18n de/en with EN fallback; dark/light theme via data-theme."
    - "A shared bulk-selection mechanism (checkboxes, select-all, N-selected action bar) is available to every list page (ADR-0027)."
  status: "In-Progress"
  scope_note: "T-500 (i18n): done. t()/<I18nProvider> (src/shared/i18n.tsx), flat de/en catalogs (201 keys, src/locales/), language persisted via the settings store, <LanguageSwitcher> in the topbar, real app defaults to DEFAULT_LANGUAGE ('de'); the useI18n() context default (used when no provider is mounted, e.g. isolated component tests) resolves against English — same tier as the missing-key fallback. Rolled out across every feature page (app shell, landing, component-definitions, SSPs, catalogs, library, shared editors/display). T-036 (ADR-0013): the entity-search widget (useEntitySearch, src/shared/useEntitySearch.ts) — a debounced typeahead, either over ArtifactRepository.getAll() per artifact type (`types` mode) or over a caller-provided fixed list for nested data like controls/params (`items` mode), with origin badges, keyboard nav (arrows/Enter/Escape), mousedown-before-blur selection (same race DatalistInput.tsx already documents), and an opaque `scope: (item) => boolean` predicate. Two consumers build on it rather than one dual-mode component: <EntitySearchField> (src/shared/EntitySearchField.tsx, a controlled value/onChange drop-in replacement for <DatalistInput>) and <GlobalSearch> (src/app/GlobalSearch.tsx, fire-and-forget search-and-navigate). Every artifact-store and nested-data picker that used to be a <DatalistInput> now uses <EntitySearchField>: component-definition import (add + inline-resolve), control-implementation source→catalog, control-id (source-scoped and SSP-unscoped), and set-parameter param-id; <DatalistInput> itself is kept only for fixed-enum pickers (component type, system/component status). <GlobalSearch> is mounted in the sidebar (Sidebar.tsx, hidden when collapsed) and searches catalogs/component-definitions/SSPs — the three artifact types with a real detail page; picking a result navigates there directly, except catalogs (no per-item route) which route to the list page instead. T-035: app shell (HashRouter, top nav, theme toggle, i18n provider) was already done; the remaining toast/error UI is now built — <ToastProvider>/useToast (src/shared/toast.tsx), mounted once at the app root (App.tsx). success/info auto-dismiss; warning/error persist until manually dismissed (an error vanishing before it's read would be a UX regression, not an improvement). Migrated the genuinely transient action-result banners across 8 files (upload/export/download/adopt success-or-failure in the 4 list pages, 2 detail pages, LibraryPage, BootstrapAssistantPage, BackMatterEditor) — deliberately left inline: not-found states, prerequisite-gating messages (no assets/catalogs yet), per-field validation (duplicate role id, import-cycle rejection), ADR-0019's live creator status, and the unresolved-import-reference banners (ADR-0031/ADR-0014) — all of those need to stay visible while the user works, not vanish like a notification. T-170 (ADR-0024): <MarkupEditor> (toolbar + preview) and <DatalistInput> (clear-on-focus datalist wrapper, fixes a native-browser UX gotcha) are new shared components used across both editors. T-171 (ADR-0025): formalized the universal-adoption policy — audited 2026-07-08, every currently-editable markup-multiline field uses <MarkupEditor>; fields with no editor yet (back-matter resource description/remarks, role/party remarks, statements, capabilities, etc.) must use it once one is built. No automated enforcement yet (flagged as a follow-up: an ESLint/harness check forbidding bare <textarea> under src/features/). ADR-0027: createSelectionSlice (src/features/shared/selectionSlice.ts) composed into createArtifactStore and the bespoke assets store; <BulkActionsBar> (src/features/shared/BulkActionsBar.tsx) is the shared 'N selected / download / delete' bar used by all four list pages. ADR-0028: <CollapsibleSection> and every bespoke expand/collapse row across editors and detail pages now share the .collapsible-section/.collapsible-toggle/.collapsible-body CSS classes (app.css) — a full-width bordered box, nesting one inside another dashed/no-shadow like fieldset fieldset already did — so a stack of expandables reads as one cohesive table instead of disparate floating pieces."
  linked_adr_ids: ["ADR-0003", "ADR-0009", "ADR-0013", "ADR-0012", "ADR-0010", "ADR-0020", "ADR-0021", "ADR-0022", "ADR-0023", "ADR-0024", "ADR-0025", "ADR-0027", "ADR-0028", "ADR-0030"]
  linked_test_ids: ["TEST-MODEL-01", "TEST-MD-01", "TEST-MDV-01", "TEST-SEARCH-01", "TEST-SEARCH-02", "TEST-SEARCH-03", "TEST-TOAST-01", "TEST-I18N-01", "TEST-CTRLID-01", "TEST-COLLAPSE-01", "TEST-COLLAPSE-02", "TEST-MDEDIT-01", "TEST-DLINPUT-01", "TEST-CAT-01", "TEST-SELECT-01", "TEST-BULK-03", "TEST-META-01"]

- id: PLAT-005
  title: "Runtime config schema validation & structured logging"
  user_story: "As a developer/operator, I want invalid runtime config to fail fast with a clear error, and every log record to be structured and traceable to an ADR, so misconfiguration is caught immediately and runtime behavior stays auditable."
  acceptance_criteria:
    - "A single TalosConfig schema aggregates runtime config; validated at boot."
    - "Invalid config halts boot with a clear, readable error screen instead of a broken app."
    - "Every log record is a structured object carrying decision_ids (ADR refs) and the running app version."
    - "Console output styles warnings amber and errors red, matching the in-app palette (ADR-0010)."
  status: "Validated"
  scope_note: "T-025: TalosConfig + validateConfig() in src/config.ts (basePath, library.rawBase, viewerUrl, defaultLanguage, oscalVersion, backMatter.maxEmbeddedFileBytes), validated in main.tsx before mounting React — on failure, renders a plain-DOM (no innerHTML) fail-fast error screen (src/app/bootError.ts) and logs a structured error, never partially booting. src/shared/logger.ts is a small structured-logger factory (createLogger(version)): every record carries decision_ids + the app version (injected at build time from package.json via vite.config.ts/vitest.config.ts's `define: { __APP_VERSION__ }`), a capped 200-record in-memory ring buffer (future in-app diagnostics panel), and console routing styled amber (warn) / red (error) per ADR-0010's hex tokens. basePath is a plain constant (not import.meta.env.BASE_URL) because src/config.ts is imported directly under Node by Playwright e2e specs, where Vite's env/define replacement isn't available. Implements ADR-0002's existing 'Runtime requirements' section — no new ADR needed. Deferred (noted, not built): retrofitting the logger into existing warn/error paths that predate it (e.g. libraryLoader offline-fallback, fileIo import warnings) — flagged as a follow-up so structured logging becomes universal, not just at boot; an in-app diagnostics panel surfacing the ring buffer; wiring TalosConfig's library.rawBase into libraryLoader.ts instead of it reading LIBRARY_RAW_BASE directly (no behavior change today, just an unconsumed validated duplicate)."
  linked_adr_ids: ["ADR-0002"]
  linked_test_ids: ["TEST-CONFIG-01", "TEST-LOG-01", "TEST-BOOT-01"]

- id: PLAT-006
  title: "Global app settings (default creator identity)"
  user_story: "As a user, I want to set my name/email once in a settings page so every new document I create already has me assigned as its creator, instead of re-entering it per document."
  acceptance_criteria:
    - "A /settings page lets the user set name, email, and an optional party uuid (auto-generated and persisted if left blank)."
    - "Every newly-created artifact (manually via an editor, or via an assistant) has the creator role/party/responsible-party pre-filled when configured; unchanged (manual entry) when not."
    - "The same uuid is reused across every document once picked — never re-minted per document."
    - "Never applied retroactively to already-created documents, and never overwrites a creator a document already has."
  status: "Validated"
  scope_note: "ADR-0033: TalosSettings gains creatorName/creatorEmail/creatorUuid (src/data/db.ts, no DB_VERSION bump — optional fields on the existing settings store). applyDefaultCreator (src/data/defaultCreator.ts) is a pure, defensive function (no-op unless both name+email set; no-op if a creator is already assigned) reused everywhere: useSeedDefaultCreator hook wired into ProfileEditorPage/SspEditorPage/ComponentDefinitionEditorPage (isNew-only), an inline equivalent in ProfileCreationAssistantPage (draft is never null there), and applyBootstrapPlans (all three SSP-bootstrap variants, ADR-0026 §9 — create branch only, never the update/re-run branch). SettingsPage.tsx (src/features/settings/) is the one place a uuid gets auto-generated, on first save, and persisted back — every other call site just reads whatever's already in settings, which is what keeps the same party uuid stable across every document. Topbar ⚙️ link (SettingsLink.tsx), not a sidebar/landing feature card (global preference, same tier as theme/language)."
  linked_adr_ids: ["ADR-0004", "ADR-0012", "ADR-0019", "ADR-0026", "ADR-0033"]
  linked_test_ids: ["TEST-SETTINGS-01", "TEST-SETTINGS-02"]

- id: CTRL-001
  title: "OSCAL Profiles (control tailoring)"
  user_story: "As a compliance author, I want to CRUD OSCAL profiles that select and tailor controls from catalogs."
  acceptance_criteria:
    - "Create/read/update/delete profiles; import controls from BSI/uploaded catalogs."
    - "Tailoring: include/exclude, set-parameters, alter."
    - "OSCAL import/export round-trip is lossless (golden-tested)."
    - "Full catalog/control viewing offloaded to the external Stand-der-Technik-Viewer."
  status: "In-Progress"
  scope_note: "T-200/T-201/T-202 (ADR-0032): full CRUD lands — src/models/profile.ts types the whole NIST v1.2.2 profile shape for lossless round-trip (golden-tested, TEST-MODEL-01); the editor covers imports[].href (workspace catalog or profile, back-matter-mediated exactly like control-implementation.source/T-142 and import-component-definition/T-102, via src/data/profileImportResolution.ts), include-all vs. include-by-id vs. exclude-by-id (a shared <ControlSelectionChecklist> — id/alt-id/title/statement-prose filterable, reused by both the editor and the Profile Creation Assistant), and modify.set-parameters. merge is fixed to as-is for v1 (no UI for flat/custom — earmarked as a possible later expansion per the MVP ticket). include-controls[].matching (pattern-based selection) and modify.alters stay typed-but-inert (unknown passthrough) — round-trip-safe, not yet editor-supported. MVP Feedback \"Profile Creation Assistant\": <ProfileCreationAssistantPage> (src/features/profiles/) — metadata + single catalog/profile source + inclusion mode (all / by-id checklist / target-object hierarchy). <TargetObjectPicker> colors each subtree from 7 pixel-sampled root hex values (src/features/profiles/targetObjectColors.ts, an HSL depth-lightening ramp, not a per-node table, so it survives the live-fetched BSI hierarchy changing) and reuses ADR-0026's ancestorChain/categoryTitlesInChain/controlMatchesAnyTitle matching core verbatim: selecting a node also renders (and control-matches on) its full ancestor chain, recomputed fresh on every click so deselection correctly drops an ancestor unless a sibling selection keeps it alive. The \"product description only\" filter checks a control's tags prop (src/models/controlTags.ts) for \"Produktbeschreibung\" (corrected 2026-07-10 — verified against the full live BSI Grundschutz++ Anwenderkatalog: 144 of 998 controls carry it; the original \"Produktspezifikation\" occurs 0 times) — one comma-separated tags prop per control, not one prop per tag. T-209 (supervisor feedback, 2026-07-10): fixed a double-counting/double-listing bug where a control with an ADR-0021 alt-identifier appeared twice (indexCatalogControls dual-keys it for lookup; enumeration now goes through the new uniqueCatalogControlEntries helper); listed the Assistant in navigationGroups()'s Assistants group before the SSP Bootstrap Assistant; fixed the by-id checklist's checkbox rendering above (not beside) each control (scoped flex-row CSS, ControlDisplay's own block display left untouched). T-204 (2026-07-11, ADR-0032 §7): SSP import-profile is now a real <EntitySearchField> picker (was: no field at all) — picking a profile offers (globalThis.confirm) to add every control it resolves to as a blank implemented-requirement, skipping ids already present; a new resolveProfileControlIds helper (profileImportResolution.ts) expands include-all only against a catalog-resolved source, flagging (not guessing) when the source is itself a profile. T-206 (2026-07-11, ADR-0032 §5): the by-id/exclude checklist and <TargetObjectPicker> now recursively resolve a profile-sourced import too — new resolveProfileEffectiveControls (profileImportResolution.ts) walks profile-of-profile imports down to their catalog sources (cycle-guarded via its own visited set, distinct from wouldCreateProfileCycle's add-time-only check), returning id->Control instead of just ids; resolveProfileControlIds is now a thin wrapper over it. The profile-sourced plain-text fallback is gone; a hint renders when a nested dangling reference or cycle leaves the resolved set incomplete."
  linked_adr_ids: ["ADR-0003", "ADR-0008", "ADR-0009", "ADR-0010", "ADR-0013", "ADR-0014", "ADR-0016", "ADR-0017", "ADR-0021", "ADR-0026", "ADR-0032"]
  linked_test_ids: ["TEST-PROF-01", "TEST-PROF-02", "TEST-PROF-03", "TEST-PROF-04", "TEST-PROF-05", "TEST-PROF-06", "TEST-PROF-07", "TEST-PROF-08", "TEST-PROF-09", "TEST-PROF-10"]
  # T-208 cleanup (2026-07-10): the back-matter-mediated resolvers in catalogResolution.ts,
  # componentImportResolution.ts, and profileImportResolution.ts now share one generic core
  # (src/data/backMatterReferenceResolution.ts) instead of three hand-copied implementations;
  # useWorkspaceCatalogs/useWorkspaceProfiles/useWorkspaceComponentDefinitions are thin wrappers
  # over one useWorkspaceArtifacts<T>(type) hook; parseCommaList is shared (src/data/commaList.ts)
  # instead of duplicated in ProfileEditorPage/ControlImplementationsEditor/controlTags.ts;
  # indexCatalogControls is memoized per catalog uuid (useCatalogControlsByUuid) instead of
  # re-walking the whole catalog tree on every render; <TargetObjectPicker> warns (toast) instead
  # of silently going gray when a root category's title has no color mapping; ProfileImport's
  # includeAll/includeControls/excludeControls mutation is centralized in
  # applyInclusion/applyExclusion (src/models/profile.ts) instead of scattered delete calls.

- id: IMPL-001
  title: "OSCAL Component-Definitions (PRIORITY)"
  user_story: "As a security engineer, I want to CRUD component-definitions describing reusable tools and processes, and compose them."
  acceptance_criteria:
    - "CRUD list/detail; editor for components, control-implementations, implemented-requirements, set-parameters, props/links."
    - "import-component-definition composition with resolved/unresolved refs, cycle protection, read-only transitive view."
    - "Adopt BSI-library component-definitions into the workspace."
    - "OSCAL import/export round-trip is lossless (golden-tested)."
  status: "In-Progress"
  scope_note: "Phase-1 scope per ADR-0017: source→catalog picker + import-component-definition compose in scope; component purpose/props/links/responsible-roles/protocols, statements, capabilities deferred. T-161: control-implementation editor now shows an info message linking to catalog upload/library when the workspace has zero catalogs, closing the last T-142 acceptance gap. T-162: control-id resolution now also matches BSI's underscore-prefixed-UUID alt-identifier form (ADR-0021), not just the literal id. T-163: the editor's component list shows collapsed summary rows (title/type/requirement count) that expand to the full per-component editor on click; a newly-added component auto-expands. T-164: the detail view's component list is likewise collapsed by default (summary row, click to expand), and each control-implementation's implemented-requirements render as a control(40%)|description(60%) table instead of a flat list. T-170 (ADR-0024): long-text fields (remarks/description) use the shared <MarkupEditor> (toolbar + preview) at a consistent minimum size; `control-implementation.source` is now back-matter-mediated (creates/reuses a resource identifying the catalog via document-id, not the catalog's own uuid directly); control-id suggestions show the resolved headline, not a raw id; the type/control-id/param-id/source datalist pickers no longer appear to offer only the current value on focus; back-matter now renders after all artifact-specific content, matching the NIST model outline order. T-160 (items 3-4, tester feedback): the implemented-requirement editor now shows the resolved control's actual content (via <ControlDisplay>, source-scoped resolution) in a control(40%)|editable-fields(60%) table next to the description/remarks/set-parameters — matching the detail page's existing convention (ADR-0028) — with a hint (not a blocking error) when the control-id doesn't resolve. A set-parameter whose picked param has an OSCAL select.choice constraint now offers a single-select dropdown (select.howMany 'one', the default) or multi-select checkboxes (select.howMany 'one-or-more') instead of free text, so a value can never drift out of the control's own defined choices; params without a choice constraint are unaffected. T-102 (ADR-0014): import-component-definition composition — `src/data/componentImportResolution.ts` mirrors `control-implementation.source`'s back-matter-mediated resolution (T-142): document-id → resource's own uuid → title, with a legacy direct-uuid fallback when no resource is involved; `wouldCreateCycle` (self + transitive) gates every add-import in the editor (`ensureArtifactResource` — renamed/generalized from `ensureCatalogSourceResource`, now shared by both catalog-source and component-definition-import back-matter references — creates the resource, never the target's own uuid directly); the add-import picker uses the existing `<DatalistInput>` stand-in (ADR-0013's entity-search widget is still unbuilt, T-036) filtered to workspace component-definitions, proactively excluding self/cycle-inducing options. The detail page gains a read-only, cycle-guarded transitive \"Imported Definitions\" tree (`<ImportTreeView>`, new generic `.imported-badge` CSS class alongside the existing library-page-specific rules). A dangling import href is never silently dropped — recorded via the now-wired `unresolvedReferences` store (`src/data/unresolvedReferences.ts`) on every editor save, replacing the prior recorded set for that source/refKind. T-105: closes the loop on what T-102 records — no new page (deliberate choice: inline on the artifact's own pages, not a cross-workspace list); each unresolved import row in the editor gains an inline resolve-in-place picker (pick a workspace target, `wouldCreateCycle`-gated, rewrites the href via `ensureArtifactResource` while preserving remarks — same cycle guard as adding a fresh import) alongside the pre-existing remove button; both the editor and detail page show a summary banner counting a document's own unresolved imports (detail page's banner links to the edit page, only for `origin !== 'library'`). T-205 (2026-07-11, ADR-0032): `control-implementation.source` now also accepts a workspace profile, not just a catalog — `catalogResolution.ts`'s `CatalogIndex` gained a `profiles: ProfileSourceEntry[]` field alongside its existing `catalogs`, and every source-scoped helper (`findSourceEntry`/`sourceOptions`/`controlIdOptionsForSource`/`paramsForControl`/`resolveControlForSource`, renamed from their catalog-only predecessors) now resolves across both. A profile source entry's `controlsById` is its effective, recursively-resolved control set (T-206's `resolveProfileEffectiveControls`) — computed in `useCatalogIndex.ts`, not `catalogResolution.ts` itself, since `profileImportResolution.ts` already imports `catalogResolution.ts` and the reverse would be a cycle. The source picker's resolved-source display now shows 📘 for a catalog vs 📑 for a profile (matching the profile editor's own import-source convention), and offers both kinds badged by type. Back-matter-mediation (item 5, ADR-0024) is unchanged and applies identically to a profile pick."
  linked_adr_ids: ["ADR-0003", "ADR-0014", "ADR-0013", "ADR-0010", "ADR-0007", "ADR-0016", "ADR-0017", "ADR-0021", "ADR-0024", "ADR-0027", "ADR-0028", "ADR-0032"]
  linked_test_ids: ["TEST-CDEF-01", "TEST-CDEF-02", "TEST-CDEF-03", "TEST-CDEF-IMP-01", "TEST-CDEF-IMP-02", "TEST-CDEF-IMP-03", "TEST-CDEF-RES-01", "TEST-CDEF-EDIT-01", "TEST-CDEF-EDIT-03"]

- id: IMPL-002
  title: "OSCAL System Security Plans / SSP (PRIORITY)"
  user_story: "As a system owner, I want to CRUD SSPs describing how a system implements controls."
  acceptance_criteria:
    - "CRUD list/detail; editor for system-characteristics, system-implementation, control-implementation (implemented-requirements -> by-components -> statements)."
    - "Link SSP to a source profile and pull in component-definitions."
    - "Per-by-component implementation status (planned/implemented/partial/alternative/not-applicable)."
    - "OSCAL import/export round-trip is lossless (golden-tested)."
  status: "In-Progress"
