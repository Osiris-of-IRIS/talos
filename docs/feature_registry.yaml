# TALOS Feature Registry
# Anchor for tests and overall implementation status.
# status: Draft | In-Progress | Validated
# Test IDs (TEST-*) are catalogued in tests/tests.yaml (T-020) and gated by
# tests/test_harness/runner.py (T-022, ADR-0018): every linked_test_id below must exist
# in that catalog, and every implemented catalog entry must map back to a feature id here.

- id: PLAT-001
  title: "Landing page / feature hub"
  user_story: "As a user, I want a single landing page linking every feature so I can navigate the whole app."
  acceptance_criteria:
    - "Cards for control/implementation/assessment layers, assistants, dashboard, and data (library/upload/export)."
    - "Priority features (component-definitions, SSPs) visually emphasized."
    - "Per-type artifact counts and empty-state guidance."
    - "Layer colors (ADR-0010) and symbols (ADR-0011); i18n de/en; theme-aware."
  status: "In-Progress"
  scope_note: "ADR-0026: bootstrap-assistant card gains a disabled state (with hover explanation) until the workspace has at least one asset, and a new 'Assistants' layer group holds it; a new 'Assets' card joins the Data layer. TEST-LAND-01/02 (full layer/counts/empty-state coverage) remain planned."
  linked_adr_ids: ["ADR-0006", "ADR-0010", "ADR-0011", "ADR-0012", "ADR-0020", "ADR-0026"]
  linked_test_ids: ["TEST-LAND-01", "TEST-LAND-02", "TEST-LAND-03"]

- id: PLAT-002
  title: "BSI Stand-der-Technik library integration"
  user_story: "As a user, I want the BSI library available at startup so I can use existing catalogs and component-definitions without uploading."
  acceptance_criteria:
    - "Library index read at startup; artifact bodies fetched lazily and cached (path+sha)."
    - "Anwenderkataloge + Komponenten shown by default; Quellkataloge behind an advanced toggle."
    - "Library items are read-only with a provenance badge; 'adopt' copies into the workspace with a new uuid."
    - "Graceful offline fallback to cache with a warning; CC-BY-SA-4.0 attribution shown."
  status: "In-Progress"
  scope_note: "T-034 done: bundled library-index.json manifest (read at startup), lazy fetch from raw.githubusercontent with retry/timeout, cache-by-sha in libraryCache, offline fallback + warning, read-only provenance badge, adopt→workspace (origin user, new uuid), CC-BY-SA-4.0 attribution, Quellkataloge behind advanced toggle. Regenerate manifest via tools/gen-library-index.mjs. Deferred: background sha-refresh job, using non-adopted library catalogs directly in the T-142 pickers (adopt-first for now), real E2E over the network."
  linked_adr_ids: ["ADR-0005", "ADR-0010", "ADR-0004"]
  linked_test_ids: ["TEST-LIB-01", "TEST-LIB-02", "TEST-LIB-03"]

- id: PLAT-003
  title: "Persistence & file I/O"
  user_story: "As a user, I want my work saved locally and to import/export OSCAL files so nothing is lost and artifacts are portable."
  acceptance_criteria:
    - "Artifacts persist in IndexedDB across sessions; data never leaves the device."
    - "Upload validates OSCAL and stores as imported; uuid collision prompts overwrite vs import-as-copy (default copy)."
    - "Any artifact downloads as spec-conformant OSCAL JSON; a selected subset of same-type artifacts downloads as one zip bundle."
    - "Draft-friendly: editing is never blocked by validation; validity is surfaced non-blocking and enforced at export."
  status: "In-Progress"
  scope_note: "ADR-0027: the 'export bundle' half of this feature's original zip acceptance criterion is now implemented, scoped to a per-page, per-type selection (buildArtifactsZip/downloadArtifactsAsZip, src/data/bulkExport.ts, via fflate) rather than one whole-workspace, all-types bundle — that broader combination (+ a manifest, per the original wording) remains unbuilt future work. A record failing export validation (ADR-0019) is skipped with a warning, not blocking the rest of the batch."
  linked_adr_ids: ["ADR-0004", "ADR-0003", "ADR-0007", "ADR-0019", "ADR-0027"]
  linked_test_ids: ["TEST-PERS-01", "TEST-PERS-02", "TEST-FILE-01", "TEST-BULK-01", "TEST-BULK-02"]

- id: PLAT-004
  title: "Shared platform (models, i18n, theme, markup, search)"
  user_story: "As a developer, I want reusable OSCAL models and shared UI utilities so every feature is consistent and safe."
  acceptance_criteria:
    - "Reusable OscalArtifact base (metadata + back-matter) extended per type; envelope codec round-trips."
    - "OSCAL markup rendered XSS-safe everywhere via one renderer."
    - "Long markup-line/markup-multiline content truncates to a consistent size by default and expands to the full, beautified content in a modal (ADR-0022)."
    - "Long-text editing fields offer basic formatting help (bold/italic/code/link) and a preview (ADR-0024)."
    - "Every editable OSCAL markup-multiline field uses the shared <MarkupEditor>, with no exceptions once an editor exists for it (ADR-0025)."
    - "Entity-search typeahead over IndexedDB with scoping; i18n de/en with EN fallback; dark/light theme via data-theme."
    - "A shared bulk-selection mechanism (checkboxes, select-all, N-selected action bar) is available to every list page (ADR-0027)."
  status: "In-Progress"
  scope_note: "T-500 (i18n): done. t()/<I18nProvider> (src/shared/i18n.tsx), flat de/en catalogs (201 keys, src/locales/), language persisted via the settings store, <LanguageSwitcher> in the topbar, real app defaults to DEFAULT_LANGUAGE ('de'); the useI18n() context default (used when no provider is mounted, e.g. isolated component tests) resolves against English — same tier as the missing-key fallback. Rolled out across every feature page (app shell, landing, component-definitions, SSPs, catalogs, library, shared editors/display). Deferred: entity-search widget (TEST-SEARCH-01, still T-036/planned). T-170 (ADR-0024): <MarkupEditor> (toolbar + preview) and <DatalistInput> (clear-on-focus datalist wrapper, fixes a native-browser UX gotcha) are new shared components used across both editors. T-171 (ADR-0025): formalized the universal-adoption policy — audited 2026-07-08, every currently-editable markup-multiline field uses <MarkupEditor>; fields with no editor yet (back-matter resource description/remarks, role/party remarks, statements, capabilities, etc.) must use it once one is built. No automated enforcement yet (flagged as a follow-up: an ESLint/harness check forbidding bare <textarea> under src/features/). ADR-0027: createSelectionSlice (src/features/shared/selectionSlice.ts) composed into createArtifactStore and the bespoke assets store; <BulkActionsBar> (src/features/shared/BulkActionsBar.tsx) is the shared 'N selected / download / delete' bar used by all four list pages. ADR-0028: <CollapsibleSection> and every bespoke expand/collapse row across editors and detail pages now share the .collapsible-section/.collapsible-toggle/.collapsible-body CSS classes (app.css) — a full-width bordered box, nesting one inside another dashed/no-shadow like fieldset fieldset already did — so a stack of expandables reads as one cohesive table instead of disparate floating pieces."
  linked_adr_ids: ["ADR-0003", "ADR-0009", "ADR-0013", "ADR-0012", "ADR-0010", "ADR-0020", "ADR-0021", "ADR-0022", "ADR-0023", "ADR-0024", "ADR-0025", "ADR-0027", "ADR-0028"]
  linked_test_ids: ["TEST-MODEL-01", "TEST-MD-01", "TEST-MDV-01", "TEST-SEARCH-01", "TEST-I18N-01", "TEST-CTRLID-01", "TEST-COLLAPSE-01", "TEST-COLLAPSE-02", "TEST-MDEDIT-01", "TEST-DLINPUT-01", "TEST-CAT-01", "TEST-SELECT-01", "TEST-BULK-03"]

