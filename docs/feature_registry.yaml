- id: ASST-002
  title: "Assistant: bootstrap an environment"
  user_story: "As a user, I want to upload an asset list and bootstrap SSPs across the target-object hierarchy."
  acceptance_criteria:
    - "Accepts a three-file CSV asset list (asset_types.csv, assets.csv, mappings.csv, golden-data shaped); non-blocking cross-check warnings for unresolved asset_type references."
    - "Landing-page card is disabled with a hover explanation until the workspace has at least one asset."
    - "Baseline is a workspace catalog (Profile baseline deferred — no Profile feature yet, ADR-0017)."
    - "NIST-style: one SSP per asset whose mapped target-object-category has Typ='IT-Systeme', control-implementation = every catalog control."
    - "BSI-style: one ISMS-wide SSP (controls with no target_object_categories tag) plus one SSP per mapped asset, filtered to controls tagged with its category or an ancestor in the BSI hierarchy."
    - "Re-running the assistant updates previously-generated SSPs in place (matched by a bootstrap-source provenance prop), never duplicates; hand-edited fields (e.g. system-implementation) are preserved."
    - "Generated artifacts persist in the ssps store and are fully editable via the existing SSP editor."
    - "The asset list page supports bulk-selecting assets to delete or download as a CSV subset (ADR-0027)."
  status: "Implemented"
  scope_note: "ADR-0026: asset list is a 3-file CSV trio (golden-data shaped) stored in bespoke assets/assetTypes IndexedDB stores (not OSCAL artifacts); target-object-category hierarchy is live-fetched from the BSI namespace CSV (ADR-0005 pattern) and cached with offline fallback. Baseline is catalog-only this phase (Profile baseline deferred, ADR-0017). Generation is two pure functions (generateNist/generateBsi) producing SSP system-characteristics+control-implementation; system-implementation (components/by-components) stays a manual follow-up in the existing SSP editor. Idempotent re-run via a bootstrap-source props[] correlation key (ADR-0023 provenance-prop precedent). ADR-0027: assets gain the shared selection slice + removeMany (deletes only from the assets store, never assetTypes) and a CSV bulk-download (serializeAssetsCsv, the write-side inverse of parseAssetsCsv) — not a zip, since assets aren't OSCAL documents."
  linked_adr_ids: ["ADR-0006", "ADR-0004", "ADR-0003", "ADR-0005", "ADR-0012", "ADR-0017", "ADR-0023", "ADR-0026", "ADR-0027"]
  linked_test_ids: ["TEST-ASST-02", "TEST-ASST-03", "TEST-ASSET-01", "TEST-ASSET-02", "TEST-ASSET-03", "TEST-ASSET-04", "TEST-TOC-01", "TEST-TOC-02", "TEST-TOC-03", "TEST-BOOTSTRAP-01", "TEST-BOOTSTRAP-02"]

