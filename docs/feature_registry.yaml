- id: IMPL-001
  title: "OSCAL Component-Definitions (PRIORITY)"
  user_story: "As a security engineer, I want to CRUD component-definitions describing reusable tools and processes, and compose them."
  acceptance_criteria:
    - "CRUD list/detail; editor for components, control-implementations, implemented-requirements, set-parameters, props/links."
    - "import-component-definition composition with resolved/unresolved refs, cycle protection, read-only transitive view."
    - "Adopt BSI-library component-definitions into the workspace."
    - "OSCAL import/export round-trip is lossless (golden-tested)."
  status: "In-Progress"
  scope_note: "Phase-1 scope per ADR-0017: source→catalog picker + import-component-definition compose in scope; component purpose/props/links/responsible-roles/protocols, statements, capabilities deferred. T-161: control-implementation editor now shows an info message linking to catalog upload/library when the workspace has zero catalogs, closing the last T-142 acceptance gap. T-162: control-id resolution now also matches BSI's underscore-prefixed-UUID alt-identifier form (ADR-0021), not just the literal id. T-163: the editor's component list shows collapsed summary rows (title/type/requirement count) that expand to the full per-component editor on click; a newly-added component auto-expands. T-164: the detail view's component list is likewise collapsed by default (summary row, click to expand), and each control-implementation's implemented-requirements render as a control(40%)|description(60%) table instead of a flat list. T-170 (ADR-0024): long-text fields (remarks/description) use the shared <MarkupEditor> (toolbar + preview) at a consistent minimum size; `control-implementation.source` is now back-matter-mediated (creates/reuses a resource identifying the catalog via document-id, not the catalog's own uuid directly); control-id suggestions show the resolved headline, not a raw id; the type/control-id/param-id/source datalist pickers no longer appear to offer only the current value on focus; back-matter now renders after all artifact-specific content, matching the NIST model outline order."
  linked_adr_ids: ["ADR-0003", "ADR-0014", "ADR-0013", "ADR-0010", "ADR-0007", "ADR-0016", "ADR-0017", "ADR-0021", "ADR-0024", "ADR-0027", "ADR-0028"]
  linked_test_ids: ["TEST-CDEF-01", "TEST-CDEF-02", "TEST-CDEF-03", "TEST-CDEF-IMP-01", "TEST-CDEF-RES-01", "TEST-CDEF-EDIT-01"]

- id: IMPL-002
  title: "OSCAL System Security Plans / SSP (PRIORITY)"
  user_story: "As a system owner, I want to CRUD SSPs describing how a system implements controls."
  acceptance_criteria:
    - "CRUD list/detail; editor for system-characteristics, system-implementation, control-implementation (implemented-requirements -> by-components -> statements)."
    - "Link SSP to a source profile and pull in component-definitions."
    - "Per-by-component implementation status (planned/implemented/partial/alternative/not-applicable)."
    - "OSCAL import/export round-trip is lossless (golden-tested)."
  status: "In-Progress"
  scope_note: "Phase-1 editor = core authoring (ADR-0017): metadata+back-matter, import-profile (manual), system-characteristics core, implemented-requirements (control-id/by-components). Deferred: statements, impact-level, system-information, users/inventory-items; profile linking (T-112). T-111/T-113 done (ADR-0023): system-implementation.components are import-only from workspace component-definitions (never authored from scratch), tracked via provenance+content-hash props with a Δ staleness badge and one-click refresh; implementation-status lives per-by-component (not per-requirement, since one control can have components in different states); removing a component cascades to strip its by-components entries; editor/detail both use default-collapsed sections+rows (new SSP starts expanded, loaded SSP starts collapsed). T-170 (ADR-0024): remarks/description fields use the shared <MarkupEditor>; control-id suggestions are unscoped across every workspace catalog (SSPs have no per-requirement source) and show the resolved headline; back-matter now renders after the three collapsible sections. ADR-0028: the detail page now resolves each requirement's control-id via <ControlDisplay> in a control(40%)|implementation(60%) table (previously: raw control-id text only, never resolved) with no per-requirement collapse (matches component-definitions' table); a by-component's description prefills from the source component's own matching implemented-requirement when picked, if still empty; every expandable (components, requirements, by-components) is now a full-width bordered box via shared .collapsible-section CSS classes."
  linked_adr_ids: ["ADR-0003", "ADR-0013", "ADR-0010", "ADR-0007", "ADR-0017", "ADR-0021", "ADR-0023", "ADR-0024", "ADR-0027", "ADR-0028"]
  linked_test_ids: ["TEST-SSP-01", "TEST-SSP-02", "TEST-SSP-03", "TEST-SSP-IMPORT-01", "TEST-SSP-RES-01"]

