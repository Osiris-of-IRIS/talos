# TALOS declarative test catalog (T-020). Decision IDs: ADR-0001, ADR-0018.
#
# Single source of truth mapping every test to its feature (docs/feature_registry.yaml)
# and its ADRs. Consumed by tests/test_harness/runner.py, which enforces the ADR-0001
# traceability chain (ADR <-> feature <-> test) and validates the golden OSCAL fixtures.
# The JS tests themselves are executed by Vitest (`npm test`) and Playwright
# (`npm run test:e2e`); the harness is an independent contract/traceability gate
# (see ADR-0018).
#
# Conventions:
#   - Every `status: implemented` suite MUST have a `file` that exists and that
#     references its `id` in a `Covers TEST-...` header (see docs/testing.md).
#   - `status: planned` suites describe not-yet-built tests (feature still Draft);
#     they need no file yet and are recorded here so the catalog mirrors
#     feature_registry implementation status.

version: 1

# ADRs whose runtime behaviour is already implemented and MUST keep >=1 implemented
# test (ADR-0001 rule 4: every runtime ADR has >=1 linked test). Add an ADR here when
# its feature lands, so the harness guards it against regression.
adr_coverage_required:
  - ADR-0001 # TDD methodology (every suite references it)
  - ADR-0002 # static client-side architecture: runtime config validation + structured logging
  - ADR-0003 # OSCAL artifact data model / envelope codec
  - ADR-0004 # client-side persistence + file I/O
  - ADR-0005 # BSI library loader (lazy fetch, cache, offline fallback, adopt)
  - ADR-0007 # import version policy (accept 1.x with warning, reject non-1.x)
  - ADR-0008 # external catalog viewer hand-off
  - ADR-0009 # OSCAL markdown rendering (XSS-safe)
  - ADR-0015 # back-matter resources + embedded-file limits
  - ADR-0016 # reusable control-display helper
  - ADR-0019 # mandatory creator identity (name + email), enforced at export
  - ADR-0022 # markup truncate-and-expand display helper
  - ADR-0012 # i18n (de/en, t() with English fallback, language stored in settings)
  - ADR-0021 # control-id resolution: literal id vs. _{uuid} alt-identifier reference
  - ADR-0023 # SSP component import, staleness tracking, implementation-status convention
  - ADR-0024 # editor UX polish: markup editor, datalist focus fix, back-matter source resolution, control-id typeahead
  - ADR-0025 # universal <MarkupEditor> adoption policy for markup-multiline fields
  - ADR-0026 # SSP bootstrap assistant: asset model, target-object-category hierarchy, generation methodology
  - ADR-0027 # bulk artifact selection: shared selection slice, multi-delete, zip/CSV bundle download
  - ADR-0028 # detail/editor visual unification: nested boxes, SSP control|implementation table, by-component prefill
  - ADR-0029 # sidebar navigation, logo branding, configurable hero background
  - ADR-0030 # expanded OSCAL markup rendering: headings/lists/code/blockquote/table, char escaping, param insertion
  - ADR-0031 # asset inventory OSCAL alignment: asset-id/uuid split, NIST asset-type alignment, inventory-item generation
  - ADR-0032 # profile CRUD, tailoring model (imports/merge/modify), Profile Creation Assistant

# Golden OSCAL fixtures under tests/data/ (ADR-0001 golden-data rule).
#   kind: oscal-document -> full document with a single wrapper key == artifact_type;
#                           base fields + oscal-version 1.2.2 are asserted (ADR-0003/0007).
#   kind: fragment       -> a bare sub-object (not a full document); only `id_field` asserted.
golden_data:
  - path: tests/data/component-definition-minimal.json
    kind: oscal-document
    artifact_type: component-definition
  - path: tests/data/component-definition-referencing.json
    kind: oscal-document
    artifact_type: component-definition
  - path: tests/data/catalog-minimal.json
    kind: oscal-document
    artifact_type: catalog
  - path: tests/data/ssp-minimal.json
    kind: oscal-document
    artifact_type: system-security-plan
  - path: tests/data/control-sample.json
    kind: fragment
    id_field: id
  - path: tests/data/catalog-target-object-categories.json
    kind: oscal-document
    artifact_type: catalog
  - path: tests/data/component-definition-with-creator.json
    kind: oscal-document
    artifact_type: component-definition
  - path: tests/data/component-definition-with-import.json
    kind: oscal-document
    artifact_type: component-definition
  - path: tests/data/profile-minimal.json
    kind: oscal-document
    artifact_type: profile

